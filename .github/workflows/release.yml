name: Release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tagName:
        description: Existing release tag to build and repair
        required: true
        type: string
  repository_dispatch:
    types: [kento_release_repair]

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the release tag or verified main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23.x'
          cache: false
      - name: Build reproducible release assets
        env:
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tagName || github.event.client_payload.tagName }}
        run: |
          set -euo pipefail
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          export SOURCE_DATE_EPOCH
          scripts/package-release.sh "$TAG_NAME" dist
          (cd dist && sha256sum --check SHA256SUMS)
      - name: Upload exact release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tagName || github.event.client_payload.tagName }}
        run: |
          set -euo pipefail
          gh release upload "$TAG_NAME" \
            "dist/github-sarif-preflight_${TAG_NAME}_linux_amd64.tar.gz" \
            "dist/github-sarif-preflight_${TAG_NAME}_linux_arm64.tar.gz" \
            "dist/github-sarif-preflight_${TAG_NAME}_darwin_amd64.tar.gz" \
            "dist/github-sarif-preflight_${TAG_NAME}_darwin_arm64.tar.gz" \
            dist/SHA256SUMS \
            --clobber
